<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2日目のスケジュール</title>
    <link rel="stylesheet" href="css/common.css">
    <!-- day2.css（青背景）を読み込む想定 -->
    <link rel="stylesheet" href="css/day2.css">
</head>

<body class="day2-bg">
    <div class="container">

        <header class="ticket-header">
            <div class="ticket-stub"><span class="ticket-title">DAY 2</span></div>
            <div class="ticket-main">
                <span class="day-number">7月19日（日）</span>
            </div>
        </header>

        <div class="nav-top-container">
            <a href="day1.html" class="nav-btn-top">◀ 1日目に戻る</a>
        </div>

        <!-- 分岐ボタンはないですが、JSエラーを防ぐためにダミーの非表示 switcher を置くか、または全部のカードを route-a route-b 共通にしておきます -->
        <div class="timeline">

            <div class="card route-a route-b" data-id="d2-01">
                <div class="card-header">
                    <div class="header-main">
                        <span class="time">〜10:00頃</span>
                        <div class="title">チェックアウト</div>
                    </div>
                    <span class="arrow">▼</span>
                </div>
                <div class="card-body">
                    <p class="memo-text">Loading...</p>
                </div>
            </div>

            <div class="card route-a route-b" data-id="d2-02">
                <div class="card-header">
                    <div class="header-main">
                        <span class="time">10:30頃</span>
                        <div class="title">上野駅で合流</div>
                    </div>
                    <span class="arrow">▼</span>
                </div>
                <div class="card-body">
                    <p class="memo-text">Loading...</p>
                </div>
            </div>

            <div class="card route-a route-b" data-id="d2-05">
                <div class="card-header">
                    <div class="header-main">
                        <span class="time">13:30〜17:00頃</span>
                        <div class="title">東京科学博物館</div>

                    <span class="arrow">▼</span>
                </div>
                <div class="card-body">
                    <p class="memo-text">Loading...</p>
                </div>
            </div>

            <div class="card route-a route-b" data-id="d2-06">
                <div class="card-header">
                    <div class="header-main">
                        <span class="time">18:00〜20:00頃</span>
                        <div class="title">サンシャイン水族館</div>

                    <span class="arrow">▼</span>
                </div>
                <div class="card-body">
                    <p class="memo-text">Loading...</p>
                </div>
            </div>

            <div class="card route-a route-b" data-id="d2-07">
                <div class="card-header">
                    <div class="header-main">
                        <span class="time">21:00頃</span>
                        <div class="title">夕飯</div>
                    </div>
                    <span class="arrow">▼</span>
                </div>
                <div class="card-body">
                    <p class="memo-text">Loading...</p>
                </div>
            </div>

            <div class="card route-a route-b" data-id="d2-08">
                <div class="card-header">
                    <div class="header-main">
                        <span class="time">24:30頃</span>
                        <div class="title">バス乗車</div>
                    </div>
                    <span class="arrow">▼</span>
                </div>
                <div class="card-body">
                    <p class="memo-text">Loading...</p>
                </div>
            </div>

        </div>

        <div class="nav-container">
            <a href="day3.html" class="nav-btn-bottom">3日目へ進む ▶</a>
        </div>
    </div>
    <script src="js/schedule.js"></script>
</body>

</html>
